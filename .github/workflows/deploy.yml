name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - stage
  workflow_dispatch:

jobs:
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint

  test:
    name: 🧪 Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test -- --ci --passWithNoTests

  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            export TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            cd ${{ secrets.PROJECT_DIR }}
            bash test_deploy.sh

  healthcheck:
    name: 💓 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for app to start
        run: sleep 15
      - name: Check site is responding
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_URL }})
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! Status: $STATUS"
            exit 1
          fi
          echo "✅ Site is up and responding!"
      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Health check неуспешен! Провери: ${{ secrets.PROD_URL }}"